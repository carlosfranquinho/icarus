name: Sincronizar iNaturalist

on:
  schedule:
    - cron: '0 6 * * 1'  # todas as segundas-feiras às 06:00 UTC
  workflow_dispatch:       # trigger manual

permissions:
  contents: write

jobs:
  sincronizar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sincronizar observações
        run: node ferramentas/sincronizar-inat.js --apply

      - name: Commit se houver alterações
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/_data/observacoes.json
          if git diff --cached --quiet; then
            echo "Sem novas observações — nada a commitar."
          else
            COUNT=$(git diff --cached --stat | grep -oP '\d+ insertion' | grep -oP '\d+' || echo '?')
            git commit -m "chore: sincronizar observações iNaturalist ($(date -u +%Y-%m-%d))"
            git push
          fi
