name: Sincronizar iNaturalist

on:
  schedule:
    - cron: '0 6 * * 1'  # todas as segundas-feiras às 06:00 UTC
  workflow_dispatch:       # trigger manual

permissions:
  contents: write
  issues: write

jobs:
  sincronizar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sincronizar observações
        run: |
          ANTES=$(node -e "console.log(require('./src/_data/observacoes.json').length)")
          node ferramentas/sincronizar-inat.js --apply
          DEPOIS=$(node -e "console.log(require('./src/_data/observacoes.json').length)")
          NOVAS=$((DEPOIS - ANTES))
          echo "NOVAS=$NOVAS" >> $GITHUB_ENV

      - name: Commit se houver alterações
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/_data/observacoes.json
          if git diff --cached --quiet; then
            echo "Sem novas observações — nada a commitar."
          else
            git commit -m "chore: sincronizar observações iNaturalist ($(date -u +%Y-%m-%d))"
            git push
          fi

      - name: Criar issue de notificação
        if: env.NOVAS != '0'
        run: |
          DATA=$(date -u +%Y-%m-%d)
          gh issue create \
            --title "iNaturalist: ${{ env.NOVAS }} novas observações ($DATA)" \
            --body "A sincronização semanal de $DATA adicionou **${{ env.NOVAS }} observações** ao \`observacoes.json\`." \
            --label "dados" || \
          gh issue create \
            --title "iNaturalist: ${{ env.NOVAS }} novas observações ($DATA)" \
            --body "A sincronização semanal de $DATA adicionou **${{ env.NOVAS }} observações** ao \`observacoes.json\`."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
